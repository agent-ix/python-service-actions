name: Reusable Pytest Runner

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
      image:
        required: true
        type: string
      registry:
        required: false
        type: string
        default: ghcr.io

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load -i image.tar

      - name: Run pytest and generate JSON report
        id: run_pytest
        continue-on-error: true
        run: |
          set -o pipefail
          docker run \
            --rm \
            -v "$GITHUB_WORKSPACE":/app \
            ${{ inputs.registry }}/${{ inputs.image }}:${{ inputs.image_tag }} \
            pytest --json-report --json-report-file=pytest.json

      - name: Upload pytest JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest
          path: pytest.json

      - name: Summarize pytest results
        if: always()
        uses: agent-ix/pytest-summary@v1
        with:
          report-path: pytest.json

      - name: Fail if pytest failed
        if: steps.run_pytest.outcome != 'success'
        run: exit 1
