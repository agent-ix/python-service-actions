name: "Pytest Runner"
description: "Runs pytest in a Docker container and summarizes the results"
inputs:
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true
  artifact:
    description: "Artifact name for the build metadata (e.g. image.json)"
    required: false
    default: "image.json"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact }}
        path: .

    - name: Extract URL from metadata
      id: meta
      shell: bash
      run: |
        echo "registry=$(jq -r '.registry' "${{ inputs.artifact }}")" >> "$GITHUB_OUTPUT"
        echo "url=$(jq -r '.url' "${{ inputs.artifact }}")" >> "$GITHUB_OUTPUT"

    - name: Docker login
      uses: docker/login-action@v3
      with:
        registry: ${{ steps.meta.outputs.registry }}
        username: ${{ inputs.registry_user }}
        password: ${{ inputs.registry_password }}

    - name: Pull Docker image
      shell: bash
      run: |
        docker pull ${{ steps.meta.outputs.url }}

    - name: Run pytest and generate JSON report
      id: run_pytest
      shell: bash
      continue-on-error: true
      run: |
        set -o pipefail
        docker run \
          --rm \
          -v "$GITHUB_WORKSPACE":/app \
          ${{ steps.meta.outputs.url }} \
          pytest --json-report --json-report-file=pytest.json

    - name: Upload pytest JSON report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest
        path: pytest.json

    - name: Summarize pytest results
      if: always()
      uses: agent-ix/pytest-summary@v1
      with:
        report-path: pytest.json

    - name: Fail if pytest failed
      if: steps.run_pytest.outcome != 'success'
      shell: bash
      run: exit 1
