name: "Pytest Runner"
description: "Runs pytest in a Docker container and summarizes the results"
inputs:
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true
  artifact:
    description: "Artifact name for the build metadata (e.g. image.json)"
    required: false
    default: "image.json"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v5

    - uses: agent-ix/docker-actions/pull@main
      id: image
      with:
        artifact: ${{ inputs.artifact }}
        registry_user: ${{ inputs.registry_user }}
        registry_password: ${{ inputs.registry_password }}

    - name: Run pytest and generate JSON report
      id: run_pytest
      shell: bash
      continue-on-error: true
      run: |
        set -o pipefail
        docker run \
          --rm \
          --user root \
          --network host \
          -w /app \
          -v "$GITHUB_WORKSPACE":/app \
          -e PYTHONPATH=/app \
          -e TEST_DATABASE_URL=postgresql+psycopg://postgres:postgres@localhost:5432/app_test \
          -e TEST_DB_HOST=localhost \
          -e TEST_DB_PORT=5432 \
          -e TEST_DB_USER=postgres \
          -e TEST_DB_PASSWORD=postgres \
          -e TEST_DB_NAME=app_test \
          ${{ steps.image.outputs.url }} \
          python -m pytest tests/ --json-report --json-report-file=pytest.json

    - name: Upload pytest JSON report
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: pytest
        path: pytest.json

    - name: Summarize pytest results
      if: always()
      uses: agent-ix/pytest-summary@v1
      with:
        report-path: pytest.json

    - name: Fail if pytest failed
      if: steps.run_pytest.outcome != 'success'
      shell: bash
      run: exit 1
