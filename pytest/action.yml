name: "Pytest Runner"
description: "Runs pytest in a Docker container and summarizes the results"
inputs:
  image_tag:
    description: "Tag of the Docker image to test"
    required: true
  image:
    description: "Name of the Docker image (e.g. my-org/myapp)"
    required: true
  registry:
    description: "Registry hostname"
    required: false
    default: "ghcr.io"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - name: Pull Docker image
      shell: bash
      run: |
        docker pull ${{ inputs.registry }}/${{ inputs.image }}:${{ inputs.image_tag }}

    - name: Run pytest and generate JSON report
      id: run_pytest
      shell: bash
      continue-on-error: true
      run: |
        set -o pipefail
        docker run \
          --rm \
          -v "$GITHUB_WORKSPACE":/app \
          ${{ inputs.registry }}/${{ inputs.image }}:${{ inputs.image_tag }} \
          pytest --json-report --json-report-file=pytest.json

    - name: Upload pytest JSON report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest
        path: pytest.json

    - name: Summarize pytest results
      if: always()
      uses: agent-ix/pytest-summary@v1
      with:
        report-path: pytest.json

    - name: Fail if pytest failed
      if: steps.run_pytest.outcome != 'success'
      shell: bash
      run: exit 1
