name: "Image Metadata"
description: "Generates image.json for a Python project using shared metadata action"

inputs:
  image:
    description: "Docker image name (e.g. my-org/myapp)"
    required: true
  registry:
    description: "Container registry"
    required: false
    default: "ghcr.io"
  artifact:
    description: "Metadata artifact filename"
    required: false
    default: "image.json"
  tag_prefix:
    description: "Optional prefix to prepend to tag (e.g. dev, base)"
    required: false
  GITHUB_TOKEN:
    description: "GitHub token for authentication"
    required: true

outputs:
  version:
    value: ${{ steps.meta.outputs.version }}
  image:
    value: ${{ steps.meta.outputs.image }}
  url:
    value: ${{ steps.meta.outputs.url }}

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - name: Set up Poetry
      uses: abatilo/actions-poetry@v3
      with:
        poetry-version: 1.8.4

    - name: Install tools for versioning and parsing
      shell: bash
      run: |
        poetry self add poetry-dynamic-versioning
        pip install toml-cli

    - name: Extract version and description
      id: extract
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        version=$(make version | sed 's/+/-/')
        desc=$(toml get --toml-path pyproject.toml tool.poetry.description | sed 's/^"//;s/"$//')
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "description=$desc" >> "$GITHUB_OUTPUT"

    - name: Generate image metadata
      id: meta
      uses: agent-ix/docker-actions/create-metadata@main
      with:
        repository: ${{ inputs.image }}
        registry: ${{ inputs.registry }}
        artifact: ${{ inputs.artifact }}
        version: ${{ steps.extract.outputs.version }}
        description: ${{ steps.extract.outputs.description }}
        tag_prefix: ${{ inputs.tag_prefix }}
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
