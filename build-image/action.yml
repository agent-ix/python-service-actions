name: "Build and Push Docker Image"
description: "Builds and pushes a Docker image using poetry versioning and GHCR caching"

inputs:
  image:
    description: "Docker image name (e.g. my-org/my-app)"
    required: true
  registry:
    description: "Docker registry"
    required: false
    default: "ghcr.io"
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true
  github_token:
    description: "GitHub token for summary or label setting"
    required: false

outputs:
  image_tag:
    description: "The generated image tag"
    value: ${{ steps.set-tag.outputs.image_tag }}

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - name: Set up poetry
      uses: abatilo/actions-poetry@v3
      with:
        poetry-version: 1.8.4

    - name: Install dependencies for versioning and parsing
      shell: bash
      run: |
        poetry self add poetry-dynamic-versioning
        pip install toml-cli

    - name: Generate version tag
      id: set-tag
      shell: bash
      run: |
        version=$(make version)
        echo "image_tag=$version" >> "$GITHUB_OUTPUT"
        echo "Version tag from make version: $version"

    - name: Extract description from pyproject.toml
      id: get-description
      shell: bash
      run: |
        desc=$(toml get --toml-path pyproject.toml tool.poetry.description | sed 's/^"//;s/"$//')
        echo "description=$desc" >> "$GITHUB_OUTPUT"
        echo "Project description: $desc"

    - name: Docker login
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry_user }}
        password: ${{ inputs.registry_password }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ inputs.registry }}/${{ inputs.image }}:${{ steps.set-tag.outputs.image_tag }}
        cache-from: type=registry,ref=${{ inputs.registry }}/${{ inputs.image }}:buildcache
        cache-to: type=registry,ref=${{ inputs.registry }}/${{ inputs.image }}:buildcache,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1
        labels: |
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.description=${{ steps.get-description.outputs.description }}
          org.opencontainers.image.version=${{ steps.set-tag.outputs.image_tag }}

    - name: Save image to tarball
      shell: bash
      run: |
        docker pull ${{ inputs.registry }}/${{ inputs.image }}:${{ steps.set-tag.outputs.image_tag }}
        docker save ${{ inputs.registry }}/${{ inputs.image }}:${{ steps.set-tag.outputs.image_tag }} -o image.tar

    - name: Upload image tarball
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: image.tar
        retention-days: 1
