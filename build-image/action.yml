name: "Build and Push Docker Image"
description: "Builds and pushes a Docker image using poetry versioning and GHCR caching"

inputs:
  image:
    description: "Docker image name (e.g. my-org/my-app)"
    required: true
  image_tag:
    description: "Tag of the Docker image (e.g. latest)"
    required: true
  registry:
    description: "Docker registry"
    required: false
    default: "ghcr.io"
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true
  github_token:
    description: "GitHub token for summary or label setting"
    required: false
  artifact:
    description: "Image build metadata artifact (e.g. image.json)"
    default: "image.json"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact }}
        path: .

    - name: Load metadata
      id: meta
      shell: bash
      run: |
        jq -r "to_entries[] | \"\(.key)=\(.value)\"" "${{ inputs.artifact }}" >> "$GITHUB_OUTPUT"
        jq -r ".labels | to_entries[] | \"label_\(.key | gsub(\"[^a-zA-Z0-9_]\"; \"_\"))=\(.value)\"" "${{ inputs.artifact }}" >> "$GITHUB_OUTPUT"
    
    - name: Docker login
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry_user }}
        password: ${{ inputs.registry_password }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.url }}
        cache-from: type=registry,ref=${{ steps.meta.image }}:buildcache
        cache-to: type=registry,ref=${{ steps.meta.image }}:buildcache,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1
        labels: |
          org.opencontainers.image.source=${{ steps.meta.source }}
          org.opencontainers.image.description=${{ steps.meta.description }}
          org.opencontainers.image.version=${{ steps.meta.version }}
