name: Outputs summary for PyPI upload
description: Outputs a formatted summary for a PyPI package published to Google Artifact Registry

inputs:
  version:
    description: "Version of the package to publish"
    required: true
  package:
    description: "Name of the package"
    required: true
  registry_url:
    description: "Base URL of the GAR PyPI registry (e.g. https://us-central1-python.pkg.dev/my-proj/my-repo)"
    required: true
  skipped:
    description: "Whether the upload was skipped due to existing version"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Write summary
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        # Strip leading v if present
        VERSION="${VERSION#v}"
        PKG_NAME="${{ inputs.package }}"
        PACKAGE_ID="$PKG_NAME==$VERSION"
        REGISTRY_URL="${{ inputs.registry_url }}"
        # Strip trailing slash if present
        REGISTRY_URL="${REGISTRY_URL%/}"
        PACKAGE_URL="${REGISTRY_URL}/simple/${PKG_NAME}/"
        SKIPPED="${{ inputs.skipped }}"

        if [ "$SKIPPED" = "true" ]; then
          echo "### ⏭️ PyPI Package Upload Skipped (Already Exists in Registry)" >> $GITHUB_STEP_SUMMARY
        else
          echo "### 📦 PyPI Package Published to Google Artifact Registry" >> $GITHUB_STEP_SUMMARY
        fi
        echo "- **Package:** \`$PKG_NAME\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Version:** \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Registry URL:** [$PACKAGE_URL]($PACKAGE_URL)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "### 📋 Usage Instructions" >> $GITHUB_STEP_SUMMARY
        echo "#### Exact version install" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "pip install \"$PKG_NAME==$VERSION\"" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### Poetry add" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "poetry add \"$PKG_NAME\" --version \"$VERSION\"" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### Package ID" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "$PACKAGE_ID" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
