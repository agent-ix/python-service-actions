name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      registry:
        required: false
        type: string
        default: ghcr.io
    secrets:
      REGISTRY_USER:
        required: true
      REGISTRY_PASSWORD:
        required: true
    outputs:
      image_tag:
        description: "The tag for the built Docker image"
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: 1.8.4
          virtualenvs-create: false
          virtualenvs-in-project: false
          cache: true

      - name: Generate version tag from poetry dynamic versioning
        id: set-tag
        run: |
          poetry self add poetry-dynamic-versioning
          version=$(make version)
          echo "image_tag=$version" >> "$GITHUB_OUTPUT"
          echo "Version tag from `make version`: $version"

      - name: Extract description from pyproject.toml
        id: get-description
        run: |
          pip install toml-cli
          desc=$(toml get --toml-path pyproject.toml tool.poetry.description | sed 's/^"//;s/"$//')
          echo "description=$desc" >> "$GITHUB_OUTPUT"
          echo "Description from pyproject.toml: $desc"

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image with GHCR layer caching
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ inputs.registry }}/${{ inputs.image }}:${{ steps.set-tag.outputs.image_tag }}
          cache-from: type=registry,ref=${{ inputs.registry }}/${{ inputs.image }}:buildcache
          cache-to: type=registry,ref=${{ inputs.registry }}/${{ inputs.image }}:buildcache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.event.repository.full_name }}
            org.opencontainers.image.description=${{ steps.get-description.outputs.description }}
            org.opencontainers.image.version=${{ steps.set-tag.outputs.image_tag }}

      - name: Get github image ID
        uses: agent-ix/python-service-actions/get-image-id@main
        id: get-image-id
        with:
          image: ${{ inputs.image }}
          tag: ${{ steps.set-tag.outputs.image_tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add image tag summary
        run: |
          echo "### 🐳 Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "- *${{ steps.set-tag.outputs.image_tag }}* [registry](https://github.com/orgs/${{ github.repository_owner }}/packages/container/${{ inputs.image_name }}/${{ steps.get-image-id.outputs.image_id }}?tag=${{ steps.set-tag.outputs.image_tag }})" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ steps.get-image-id.outputs.image_id }}" >> $GITHUB_STEP_SUMMARY

      - name: Pull pushed image (for tarball export)
        run: docker pull ${{ inputs.registry }}/${{ inputs.image }}:${{ steps.set-tag.outputs.image_tag }}

      - name: Save image to tarball
        run: docker save ${{ inputs.registry }}/${{ inputs.image }}:${{ steps.set-tag.outputs.image_tag }} -o image.tar

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1
