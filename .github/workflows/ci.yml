name: Full CI

on:
  workflow_call:
    inputs:
      image:
        description: "Docker image name (e.g. my-org/myapp)"
        required: true
        type: string
      registry:
        required: false
        type: string
        default: ghcr.io
      extra_index_url:
        description: "Extra PyPI index URL for internal packages"
        required: false
        type: string
        default: ""
    secrets:
      REGISTRY_USER:
        description: "Docker registry username"
        required: true
      REGISTRY_PASSWORD:
        required: true
        description: "Docker registry password"
      GCP_KEY:
        description: "GCP service account JSON key for internal PyPI auth"
        required: false

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: agent-ix/python-service-actions/image-metadata@main
        with:
          image: ${{ inputs.image }}
          registry: ${{ inputs.registry }}
          GITHUB_TOKEN: ${{ secrets.REGISTRY_PASSWORD }}
          registry_username: ${{ secrets.GCP_KEY != '' && '_json_key_base64' || '' }}
          registry_password: ${{ secrets.GCP_KEY != '' && secrets.GCP_KEY || '' }}
      - name: Encode and mask GCP key

        id: encode
        run: |
          KEY64=$(echo '${{ secrets.GCP_KEY }}' | base64 -w 0)
          echo "::add-mask::$KEY64"
          echo "::add-mask::_json_key_base64"
          echo "key64=$KEY64" >> $GITHUB_OUTPUT
      - uses: agent-ix/docker-actions/build@main
        with:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GITHUB_TOKEN: ${{ github.token }}
          extra_index_url: ${{ inputs.extra_index_url }}
          pypi_user: ${{ secrets.GCP_KEY != '' && '_json_key_base64' || '' }}
          pypi_pass: ${{ steps.encode.outputs.key64 }}

  pytest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: agent-ix/python-service-actions/pytest@main
        with:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

  black:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: agent-ix/python-service-actions/black@main
        with:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

  ruff:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: agent-ix/python-service-actions/ruff@main
        with:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
