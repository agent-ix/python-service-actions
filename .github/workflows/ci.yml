name: Full CI

on:
  workflow_call:
    inputs:
      image:
        description: "Docker image name (e.g. my-org/myapp)"
        required: true
        type: string
      registry:
        required: false
        type: string
        default: ghcr.io
    secrets:
      REGISTRY_USER:
        description: "Docker registry username"
        required: true
      REGISTRY_PASSWORD:
        required: true
        description: "Docker registry password"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: agent-ix/python-service-actions/build-image@main
        with:
          image: ${{ inputs.image }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

  pytest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: agent-ix/python-service-actions/pytest@main
        with:
          image_tag: ${{ needs.build.outputs.image_tag }}
          image: ${{ inputs.image }}

  black:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: agent-ix/python-service-actions/black@main
        with:
          image_tag: ${{ needs.build.outputs.image_tag }}
          image: ${{ inputs.image }}

  flake8:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: agent-ix/python-service-actions/flake8@main
        with:
          image_tag: ${{ needs.build.outputs.image_tag }}
          image: ${{ inputs.image }}
