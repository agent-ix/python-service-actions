name: "Ruff Runner"
description: "Run ruff against a Docker image"
inputs:
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true
  artifact:
    description: "Image build metadata artifact (e.g. image.json)"
    default: "image.json"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v5

    - uses: agent-ix/docker-actions/pull@main
      id: image
      with:
        artifact: ${{ inputs.artifact }}
        registry_user: ${{ inputs.registry_user }}
        registry_password: ${{ inputs.registry_password }}

    - name: Run ruff
      id: run_ruff
      shell: bash
      continue-on-error: true
      run: |
        set -o pipefail
        docker run \
          --rm \
          -v "$GITHUB_WORKSPACE":/app \
          ${{ steps.image.outputs.url }} \
          ruff check . | tee ruff.txt

    - uses: actions/upload-artifact@v6
      if: always()
      with:
        name: ruff
        path: ruff.txt

    - name: Add summary
      if: always()
      shell: bash
      run: |
        echo '### ⚡ Ruff Report' >> $GITHUB_STEP_SUMMARY
        cat ruff.txt | tee /dev/stderr >> $GITHUB_STEP_SUMMARY

    - name: Fail if ruff failed
      if: steps.run_ruff.outcome != 'success'
      shell: bash
      run: exit 1
