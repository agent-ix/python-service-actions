name: "Black Formatter Checker"
description: "Runs Black in a Docker container and summarizes the output"
inputs:
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true
  artifact:
    description: "Artifact name for the build metadata (e.g. image.json)"
    required: false
    default: "image.json"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact }}
        path: .

    - name: Extract URL from metadata
      id: meta
      shell: bash
      run: |
        echo "registry=$(jq -r '.registry' "${{ inputs.artifact }}")" >> "$GITHUB_OUTPUT"
        echo "url=$(jq -r '.url' "${{ inputs.artifact }}")" >> "$GITHUB_OUTPUT"

    - name: Docker login
      uses: docker/login-action@v3
      with:
        registry: ${{ steps.meta.outputs.registry }}
        username: ${{ inputs.registry_user }}
        password: ${{ inputs.registry_password }}

    - name: Pull Docker image
      shell: bash
      run: |
        docker pull ${{ steps.meta.outputs.url }}

    - name: Run black
      id: run_black
      shell: bash
      continue-on-error: true
      run: |
        set -o pipefail
        docker run \
          --rm \
          -v "$GITHUB_WORKSPACE":/app \
          ${{ steps.meta.outputs.url }} \
          black --check . 2>&1 | tee black.txt

    - name: Upload black output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: black
        path: black.txt

    - name: Add summary
      if: always()
      shell: bash
      run: |
        echo '### ⚫ Black Report' >> $GITHUB_STEP_SUMMARY
        cat black.txt | tee /dev/stderr >> $GITHUB_STEP_SUMMARY

    - name: Fail if black failed
      if: steps.run_black.outcome != 'success'
      shell: bash
      run: exit 1
