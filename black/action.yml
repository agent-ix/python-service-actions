name: "Black Formatter Checker"
description: "Runs Black in a Docker container and summarizes the output"
inputs:
  image_tag:
    description: "Tag of the Docker image to check"
    required: true
  image:
    description: "Name of the Docker image (e.g. my-org/myapp)"
    required: true
  registry:
    description: "Registry hostname"
    required: false
    default: "ghcr.io"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - name: Pull Docker image
      shell: bash
      run: |
        docker pull ${{ inputs.registry }}/${{ inputs.image }}:${{ inputs.image_tag }}

    - name: Run black
      id: run_black
      shell: bash
      continue-on-error: true
      run: |
        set -o pipefail
        docker run \
          --rm \
          -v "$GITHUB_WORKSPACE":/app \
          ${{ inputs.registry }}/${{ inputs.image }}:${{ inputs.image_tag }} \
          black --check . 2>&1 | tee black.txt

    - name: Upload black output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: black
        path: black.txt

    - name: Add summary
      if: always()
      shell: bash
      run: |
        echo '### ⚫ Black Report' >> $GITHUB_STEP_SUMMARY
        cat black.txt | tee /dev/stderr >> $GITHUB_STEP_SUMMARY

    - name: Fail if black failed
      if: steps.run_black.outcome != 'success'
      shell: bash
      run: exit 1
