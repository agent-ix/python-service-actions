name: "Flake8 Runner"
description: "Run flake8 against a Docker image"
inputs:
  artifact:
    description: "Image build metadata artifact (e.g. image.json)"
    default: "image.json"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact }}
        path: .

    - name: Extract URL from metadata
      id: meta
      shell: bash
      run: |
        echo "url=$(jq -r '.url' "${{ inputs.artifact }}")" >> "$GITHUB_OUTPUT"

    - name: Pull Docker image
      shell: bash
      run: |
        docker pull ${{ steps.meta.url }}

    - name: Run flake8
      id: run_flake8
      shell: bash
      continue-on-error: true
      run: |
        set -o pipefail
        docker run \
          --rm \
          -v "$GITHUB_WORKSPACE":/app \
          ${{ steps.meta.url }} \
          flake8 --format=default . | tee flake8.txt

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: flake8
        path: flake8.txt

    - name: Add summary
      if: always()
      shell: bash
      run: |
        echo '### 🧼 Flake8 Report' >> $GITHUB_STEP_SUMMARY
        cat flake8.txt | tee /dev/stderr >> $GITHUB_STEP_SUMMARY

    - name: Fail if flake8 failed
      if: steps.run_flake8.outcome != 'success'
      shell: bash
      run: exit 1
